<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayRoll Edge</title>
<link rel="stylesheet" href="PE.css">
</head>

<body>

<div class="header">
    <h2>PayRoll Edge</h2>
    <div class="security">MANAGEMENT SITE</div>
    <div class="nav">
        <a href="#">Staff</a>
        <a href="#">Timesheets</a>
        <a href="#">Payslips</a>
        <a href="#">Tax View</a>
    </div>
</div>

<div class="dashboard">
    <div class="card">
        <h3>Next Payday</h3>
        <p>April 30</p>
    </div>

    <div class="card">
        <h3>Total Hours</h3>
        <p id="hours">0</p>
    </div>

    <div class="card">
        <h3>Tax</h3>
        <p id="tax">0</p>
    </div>
</div>

<div class="form">
    <h3>Select Staff</h3>
    <select id="staff">
        <option value="Adrian">Adrian</option>
        <option value="Kyle">Kyle</option>
        <option value="Mark">Mark</option>
        <option value="Steven">Steven</option>
        <option value="Jull">Jull</option>
        <option value="Vincent">Vincent</option>
    </select>
</div>

<div class="form">
    <h3>Log Work Hours</h3>
    <input type="number" id="workHours" placeholder="Enter hours">
    <button onclick="calculate()">Calculate Tax</button>
</div>

<div class="form">
    <h3>Payslip</h3>
    <table>
        <tr><th>Employee</th><td id="emp"></td></tr>
        <tr><th>Hours</th><td id="ps-hours"></td></tr>
        <tr><th>Rate</th><td>₱100/hr</td></tr>
        <tr><th>Gross Pay</th><td id="gross"></td></tr>
        <tr><th>Tax</th><td id="ps-tax"></td></tr>
        <tr><th>Net Pay</th><td id="net"></td></tr>
    </table>
    <button onclick="exportData()">Export Data</button>
</div>

<script src="PEJS.js"></script>
</body>
</html>
